<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Buy - Mobile Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; }
    .page-header { background: linear-gradient(135deg, #198754, #0f5132); color: #fff; padding: 40px 0; text-align: center; margin-bottom: 30px; }
    .buy-card { background: #fff; border-radius: 14px; padding: 30px; box-shadow: 0 4px 24px rgba(0,0,0,0.09); }
    .total-display { font-size: 1.8rem; font-weight: 700; color: #198754; }
    video { border-radius: 12px; width: 100%; height: 100%; object-fit: cover; max-height: 380px; }
  </style>
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="page-header">
  <h2><i class="fa fa-credit-card me-2"></i>Buy</h2>
  <p class="mb-0">Complete your purchase</p>
</div>

<div class="container">
  <div class="row g-4">
    <!-- Buy Form -->
    <div class="col-md-6">
      <div class="buy-card">
        <h4 class="fw-bold mb-4 text-center">Buy</h4>

        <div class="mb-3">
          <label class="form-label fw-semibold">Total</label>
          <div class="total-display" id="totalDisplay">0 SAR</div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Payment Method</label><br>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="payment" id="payVisa" value="Visa" checked />
            <label class="form-check-label" for="payVisa"><i class="fab fa-cc-visa fa-lg text-primary me-1"></i>Visa</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="payment" id="payPaypal" value="PayPal" />
            <label class="form-check-label" for="payPaypal"><i class="fab fa-cc-paypal fa-lg text-primary me-1"></i>PayPal</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="payment" id="payCash" value="Cash" />
            <label class="form-check-label" for="payCash"><i class="fa fa-money-bill-wave fa-lg text-success me-1"></i>Cash</label>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Note</label>
          <textarea id="buyNote" class="form-control" rows="4" placeholder="Enter your comment..."></textarea>
        </div>

        <button class="btn btn-success w-100 btn-lg fw-bold" onclick="submitOrder()">
          <i class="fa fa-check me-2"></i>Submit
        </button>
      </div>
    </div>

    <!-- Video -->
    <div class="col-md-6 d-flex align-items-center">
      <video autoplay muted loop playsinline>
        <source src="https://cdn.pixabay.com/video/2016/03/07/2373-158370738_large.mp4" type="video/mp4" />
        Your browser does not support video.
      </video>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="navbar.js"></script>
<script>
  const SUPABASE_URL = "https://mlrrzqetrhtcjyhowuyy.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1scnJ6cWV0cmh0Y2p5aG93dXl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTM3NDYsImV4cCI6MjA5NDI2OTc0Nn0.XXZbyYLJbn9g2ibZilbOdA084MHjiM1R-DsK5RsU7Qc";

  renderNavbar('buy');

  if (sessionStorage.getItem('role') !== 'customer') {
    window.location.href = 'home.html';
  }

  const total = localStorage.getItem('cartTotal') || 0;
  document.getElementById('totalDisplay').textContent = `${total} SAR`;

  function getPayment() {
    return document.querySelector('input[name="payment"]:checked').value;
  }

  async function submitOrder() {
    const paymentType = getPayment();
    const custname = sessionStorage.getItem('username') || 'Guest';
    const orderTotal = parseInt(total) || 0;

    const result = await Swal.fire({
      title: `Total order = ${orderTotal} SAR using ${paymentType}`,
      text: 'Sure?',
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: 'Yes',
      cancelButtonText: 'Cancel',
      confirmButtonColor: '#0d6efd'
    });

    if (result.isConfirmed) {
      // Save order to Supabase
      await fetch(`${SUPABASE_URL}/rest/v1/orders`, {
        method: 'POST',
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          Prefer: 'return=minimal'
        },
        body: JSON.stringify({ custname, total: orderTotal })
      });

      // Clear cart
      localStorage.removeItem('cart');
      localStorage.removeItem('cartTotal');
      localStorage.setItem('cartCount', 0);

      await Swal.fire({ icon: 'success', title: 'Order placed!', text: 'Thank you for your purchase.', timer: 2000, showConfirmButton: false });
      window.location.href = 'home.html';
    }
  }
</script>
</body>
</html>
