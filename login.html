<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login - Mobile Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: url('https://images.pexels.com/photos/1092644/pexels-photo-1092644.jpeg?auto=compress&cs=tinysrgb&w=1600') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-box {
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      color: #fff;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .login-box h2 { text-align: center; margin-bottom: 28px; font-weight: 700; letter-spacing: 1px; }
    .form-label { color: #ddd; }
    .form-control { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); color: #fff; }
    .form-control:focus { background: rgba(255,255,255,0.2); color: #fff; border-color: #0d6efd; box-shadow: none; }
    .form-control::placeholder { color: #bbb; }
    .btn-login { width: 100%; margin-top: 10px; font-weight: 600; letter-spacing: 0.5px; }
    .reg-link { text-align: center; margin-top: 16px; }
    .reg-link a { color: #6ea8fe; }
    .alert-error { display: none; }
    .logo-icon { text-align: center; font-size: 2.5rem; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo-icon"><i class="fa-solid fa-mobile-screen-button"></i></div>
    <h2>Mobile Store</h2>
    <div id="alertError" class="alert alert-danger alert-error" role="alert">
      Invalid username or password.
    </div>
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" id="username" class="form-control" placeholder="Enter username" maxlength="12" required />
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter password" required />
    </div>
    <button class="btn btn-success btn-login" onclick="doLogin()">
      <i class="fa fa-right-to-bracket me-2"></i>Login
    </button>
    <div class="reg-link">
      <small>Not registered? <a href="register.html">Create account</a></small>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://mlrrzqetrhtcjyhowuyy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1scnJ6cWV0cmh0Y2p5aG93dXl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTM3NDYsImV4cCI6MjA5NDI2OTc0Nn0.XXZbyYLJbn9g2ibZilbOdA084MHjiM1R-DsK5RsU7Qc";

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!username || !password) { showError(); return; }

      const res = await fetch(`${SUPABASE_URL}/rest/v1/users?username=eq.${encodeURIComponent(username)}&password=eq.${encodeURIComponent(password)}&select=*`, {
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
      });
      const data = await res.json();
      if (data && data.length > 0) {
        sessionStorage.setItem('username', data[0].username);
        sessionStorage.setItem('role', data[0].role);
        window.location.href = 'home.html';
      } else {
        showError();
      }
    }

    function showError() {
      const el = document.getElementById('alertError');
      el.style.display = 'block';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
