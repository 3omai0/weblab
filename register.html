<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register - Mobile Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    body {
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .reg-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.12);
    }
    .reg-card h2 { text-align: center; font-weight: 700; margin-bottom: 28px; color: #1a1a2e; }
    .logo-icon { text-align: center; font-size: 2.2rem; color: #0d6efd; margin-bottom: 6px; }
    .btn-reg { width: 100%; font-weight: 600; }
  </style>
</head>
<body>
  <div class="reg-card">
    <div class="logo-icon"><i class="fa-solid fa-mobile-screen-button"></i></div>
    <h2>Registration Here</h2>

    <div id="alertMsg" class="alert d-none"></div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Username</label>
      <input type="text" id="reg_username" class="form-control" placeholder="Enter username" required />
    </div>
    <div class="mb-3">
      <label id="lbl_pass" class="form-label fw-semibold">Password</label>
      <input type="password" id="reg_password" class="form-control" placeholder="Enter password" required />
    </div>
    <div class="mb-3">
      <label id="lbl_confirm" class="form-label fw-semibold">Confirm Password</label>
      <input type="password" id="reg_confirm" class="form-control" placeholder="Confirm password" required />
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Email</label>
      <input type="email" id="reg_email" class="form-control" placeholder="Enter email" required />
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Age</label>
      <input type="number" id="reg_age" class="form-control" placeholder="Enter age" required />
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Birthday</label>
      <input type="date" id="reg_dob" class="form-control" required />
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" id="reg_agree" />
      <label id="lbl_agree" class="form-check-label fw-semibold" for="reg_agree">I agree</label>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-success btn-reg" onclick="doRegister()">Register</button>
      <button class="btn btn-secondary btn-reg" onclick="clearForm()">Clear</button>
    </div>
    <div class="text-center mt-3">
      <a href="login.html" class="text-muted"><small><i class="fa fa-arrow-left me-1"></i>Back to Login</small></a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://mlrrzqetrhtcjyhowuyy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1scnJ6cWV0cmh0Y2p5aG93dXl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTM3NDYsImV4cCI6MjA5NDI2OTc0Nn0.XXZbyYLJbn9g2ibZilbOdA084MHjiM1R-DsK5RsU7Qc";

    async function doRegister() {
      // Reset labels
      document.getElementById('lbl_pass').style.color = '';
      document.getElementById('lbl_confirm').style.color = '';
      document.getElementById('lbl_agree').style.color = '';

      const username = document.getElementById('reg_username').value.trim();
      const password = document.getElementById('reg_password').value.trim();
      const confirm  = document.getElementById('reg_confirm').value.trim();
      const email    = document.getElementById('reg_email').value.trim();
      const age      = parseInt(document.getElementById('reg_age').value);
      const agree    = document.getElementById('reg_agree').checked;

      // Password match
      if (password !== confirm) {
        document.getElementById('lbl_pass').style.color = 'red';
        document.getElementById('lbl_confirm').style.color = 'red';
        alert('Passwords do not match.');
        return;
      }

      // Age check
      if (age <= 10) {
        alert('Age must be above 10.');
        return;
      }

      // Agree check
      if (!agree) {
        document.getElementById('lbl_agree').style.color = 'red';
        alert('You must agree to the terms!');
        return;
      }

      // Save to Supabase
      const res = await fetch(`${SUPABASE_URL}/rest/v1/users`, {
        method: 'POST',
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          Prefer: 'return=minimal'
        },
        body: JSON.stringify({ username, password, role: 'customer', email })
      });

      if (res.ok || res.status === 201) {
        sessionStorage.setItem('username', username);
        sessionStorage.setItem('role', 'customer');
        window.location.href = 'home.html';
      } else {
        showAlert('Registration failed. Username may already exist.', 'danger');
      }
    }

    function clearForm() {
      ['reg_username','reg_password','reg_confirm','reg_email','reg_age','reg_dob'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('reg_agree').checked = false;
    }

    function showAlert(msg, type) {
      const el = document.getElementById('alertMsg');
      el.className = `alert alert-${type}`;
      el.textContent = msg;
    }
  </script>
</body>
</html>
