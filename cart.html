<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Cart - Mobile Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; }
    .page-header { background: linear-gradient(135deg, #0d6efd, #0a58ca); color: #fff; padding: 40px 0; text-align: center; margin-bottom: 30px; }
    .cart-section { max-width: 800px; margin: 0 auto; background: #fff; border-radius: 14px; padding: 30px; box-shadow: 0 4px 24px rgba(0,0,0,0.09); }
    .cart-table th { background: #343a40; color: #fff; }
    .total-row td { font-weight: bold; font-size: 1.1rem; }
    #priceDisplay { font-size: 1.2rem; font-weight: 600; color: #0d6efd; }
  </style>
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="page-header">
  <h2><i class="fa fa-cart-shopping me-2"></i>My Shopping Cart</h2>
</div>

<div class="container">
  <div class="cart-section">

    <!-- Add Item Row -->
    <div class="row g-2 align-items-center mb-4">
      <div class="col-md-5">
        <label class="form-label fw-semibold">Enter Product Name</label>
        <input type="text" id="productInput" class="form-control" placeholder="e.g. Samsung Galaxy S20+" />
      </div>
      <div class="col-md-3">
        <label class="form-label fw-semibold">Quantity</label>
        <input type="number" id="quantityInput" class="form-control" min="1" value="1" />
      </div>
      <div class="col-md-2 pt-4">
        <button class="btn btn-primary w-100" onclick="lookupProduct()"><i class="fa fa-search"></i> Find</button>
      </div>
      <div class="col-md-2 pt-4">
        <button class="btn btn-success w-100" onclick="addToCart()"><i class="fa fa-plus"></i> Buy</button>
      </div>
    </div>

    <div id="priceDisplay" class="mb-3"></div>

    <!-- Cart Table -->
    <table class="table cart-table table-bordered" id="cartTable">
      <thead>
        <tr><th>Name</th><th>Price</th><th>Quantity</th><th>Action</th></tr>
      </thead>
      <tbody id="cartBody"></tbody>
    </table>

    <div class="text-end">
      <button class="btn btn-danger btn-lg px-5" onclick="checkout()">
        <i class="fa fa-credit-card me-2"></i>Checkout
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="navbar.js"></script>
<script>
  const SUPABASE_URL = "https://mlrrzqetrhtcjyhowuyy.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1scnJ6cWV0cmh0Y2p5aG93dXl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTM3NDYsImV4cCI6MjA5NDI2OTc0Nn0.XXZbyYLJbn9g2ibZilbOdA084MHjiM1R-DsK5RsU7Qc";

  renderNavbar('cart');

  // Check customer access
  if (sessionStorage.getItem('role') !== 'customer') {
    window.location.href = 'home.html';
  }

  let cart = JSON.parse(localStorage.getItem('cart') || '[]');
  let foundProduct = null;

  renderCart();

  async function lookupProduct() {
    const name = document.getElementById('productInput').value.trim();
    if (!name) return;

    const res = await fetch(`${SUPABASE_URL}/rest/v1/items?select=*`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });
    const items = await res.json();
    foundProduct = items.find(i => i.title.toLowerCase() === name.toLowerCase());

    if (foundProduct) {
      document.getElementById('priceDisplay').textContent = `Price: ${foundProduct.price} SAR`;
    } else {
      document.getElementById('priceDisplay').textContent = 'Product not found.';
      document.getElementById('priceDisplay').style.color = 'red';
      foundProduct = null;
    }
  }

  function addToCart() {
    if (!foundProduct) { alert('Please find a product first.'); return; }
    const qty = parseInt(document.getElementById('quantityInput').value) || 1;
    const existing = cart.find(c => c.name === foundProduct.title);
    if (existing) {
      existing.quantity += qty;
    } else {
      cart.push({ name: foundProduct.title, price: foundProduct.price, quantity: qty });
    }
    saveCart();
    renderCart();
    document.getElementById('productInput').value = '';
    document.getElementById('priceDisplay').textContent = '';
    foundProduct = null;
  }

  function deleteItem(index) {
    cart.splice(index, 1);
    saveCart();
    renderCart();
  }

  function renderCart() {
    const tbody = document.getElementById('cartBody');
    if (cart.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Cart is empty</td></tr>';
      return;
    }
    tbody.innerHTML = cart.map((item, i) => `
      <tr>
        <td>${item.name}</td>
        <td>${item.price} SAR</td>
        <td>${item.quantity}</td>
        <td><button class="btn btn-sm btn-danger" onclick="deleteItem(${i})">Delete</button></td>
      </tr>`).join('');
  }

  function saveCart() {
    localStorage.setItem('cart', JSON.stringify(cart));
    const totalItems = cart.reduce((s, i) => s + i.quantity, 0);
    localStorage.setItem('cartCount', totalItems);
  }

  function checkout() {
    if (cart.length === 0) { alert('Your cart is empty!'); return; }
    const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
    localStorage.setItem('cartTotal', total);
    localStorage.setItem('cartCount', cart.reduce((s,i)=>s+i.quantity,0));

    Swal.fire({
      icon: 'success',
      title: 'Thank You!',
      html: `<strong>Total: ${total} SAR</strong><br>Your order is ready to checkout.`,
      confirmButtonText: 'Go to Buy Page'
    }).then(r => {
      if (r.isConfirmed) window.location.href = 'buy.html';
    });
  }
</script>
</body>
</html>
