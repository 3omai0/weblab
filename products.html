<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Our Products - Mobile Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f8f9fa;
    }

    .page-header {
      background: linear-gradient(135deg, #0d6efd, #0a58ca);
      color: #fff;
      padding: 40px 0;
      text-align: center;
      margin-bottom: 30px;
    }

    .products-table {
      width: 70%;
      margin: 0 auto 40px;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .products-table th {
      background: #0d6efd;
      color: #fff;
      text-align: center;
    }

    .products-table td {
      text-align: center;
      vertical-align: middle;
    }

    .products-table img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: 8px;
    }

    .loading {
      text-align: center;
      padding: 40px;
    }
  </style>
</head>

<body>

  <div id="navbar-placeholder"></div>

  <div class="page-header">
    <h2><i class="fa-solid fa-mobile-screen-button me-2"></i>Our Products</h2>
    <p class="mb-0">All available smartphones in our store</p>
  </div>

  <div class="loading" id="loading">
    <div class="spinner-border text-primary"></div>
    <p class="mt-2 text-muted">Loading products...</p>
  </div>

  <table class="products-table table table-hover table-bordered mb-5" id="productsTable" style="display:none;">
    <thead>
      <tr>
        <th>Title</th>
        <th>Description</th>
        <th>Image</th>
        <th>Price</th>
      </tr>
    </thead>
    <tbody id="productsTbody"></tbody>
  </table>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="navbar.js"></script>
  <script>
    const SUPABASE_URL = "https://mlrrzqetrhtcjyhowuyy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1scnJ6cWV0cmh0Y2p5aG93dXl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTM3NDYsImV4cCI6MjA5NDI2OTc0Nn0.XXZbyYLJbn9g2ibZilbOdA084MHjiM1R-DsK5RsU7Qc";

    renderNavbar('products');

    async function loadProducts() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/items?select=*`, {
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
      });
      const items = await res.json();
      document.getElementById('loading').style.display = 'none';

      if (!items || items.length === 0) {
        document.getElementById('loading').innerHTML = '<p class="text-muted">No products found.</p>';
        document.getElementById('loading').style.display = 'block';
        return;
      }

      const tbody = document.getElementById('productsTbody');
      tbody.innerHTML = items.map(item => `
      <tr>
        <td class="fw-semibold">${item.title || '-'}</td>
        <td class="text-start small">${item.description || '-'}</td>
        <td><img src="${item.image || 'https://via.placeholder.com/70'}" alt="${item.title}" /></td>
        <td class="text-primary fw-bold">${item.price} SAR</td>
      </tr>`).join('');

      document.getElementById('productsTable').style.display = 'table';
    }

    loadProducts();
  </script>
</body>

</html>
