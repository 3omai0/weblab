<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Search Product - Mobile Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; }
    .page-header { background: linear-gradient(135deg, #0d6efd, #0a58ca); color: #fff; padding: 40px 0; text-align: center; margin-bottom: 30px; }
    .search-box { max-width: 700px; margin: 0 auto 30px; }
    #resultsTable { width: 80%; margin: 0 auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    #resultsTable th { background: #0d6efd; color: #fff; text-align: center; }
    #resultsTable td { text-align: center; vertical-align: middle; }
    #resultsTable img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; }
    #resultsSection { display: none; }
    #noResult { display: none; text-align: center; padding: 20px; color: #dc3545; }
  </style>
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="page-header">
  <h2><i class="fa fa-search me-2"></i>Search Product</h2>
  <p class="mb-0">Find your perfect smartphone</p>
</div>

<div class="container">
  <div class="search-box">
    <div class="input-group shadow-sm">
      <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Enter product name..." />
      <button class="btn btn-primary btn-lg px-4" onclick="doSearch()">
        <i class="fa fa-search me-1"></i>Search
      </button>
    </div>
  </div>

  <div id="noResult" class="text-center py-3">
    <i class="fa fa-circle-exclamation fa-2x text-danger mb-2"></i>
    <p>No products matched your search.</p>
  </div>

  <div id="resultsSection">
    <table id="resultsTable" class="table table-hover animate__animated animate__fadeInDownBig mb-5">
      <thead>
        <tr>
          <th>Title</th>
          <th>Description</th>
          <th>Image</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody id="resultsTbody"></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="navbar.js"></script>
<script>
  const SUPABASE_URL = "https://mlrrzqetrhtcjyhowuyy.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1scnJ6cWV0cmh0Y2p5aG93dXl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTM3NDYsImV4cCI6MjA5NDI2OTc0Nn0.XXZbyYLJbn9g2ibZilbOdA084MHjiM1R-DsK5RsU7Qc";

  renderNavbar('search');

  let allItems = [];

  async function fetchAll() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/items?select=*`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });
    allItems = await res.json();
  }

  fetchAll();

  async function doSearch() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!query) return;

    if (allItems.length === 0) await fetchAll();

    const filtered = allItems.filter(item =>
      (item.title || '').toLowerCase().includes(query)
    );

    const section = document.getElementById('resultsSection');
    const noResult = document.getElementById('noResult');
    const tbody = document.getElementById('resultsTbody');
    const table = document.getElementById('resultsTable');

    // Reset animation
    table.classList.remove('animate__fadeInDownBig');
    void table.offsetWidth;
    table.classList.add('animate__fadeInDownBig');

    if (filtered.length === 0) {
      section.style.display = 'none';
      noResult.style.display = 'block';
      return;
    }

    noResult.style.display = 'none';
    section.style.display = 'block';

    tbody.innerHTML = filtered.map(item => `
      <tr>
        <td class="fw-semibold">${item.title}</td>
        <td class="text-start small">${item.description || '-'}</td>
        <td><img src="${item.image || 'https://via.placeholder.com/70'}" alt="${item.title}" /></td>
        <td class="text-primary fw-bold">${item.price} SAR</td>
      </tr>`).join('');
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
</script>
</body>
</html>
